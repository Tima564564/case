services:
  - type: web
    runtime: node
    name: case-platform-api
    region: frankfurt
    plan: starter
    buildCommand: cd apps/api && npm install --include=dev && npx prisma generate --schema ../../packages/db/prisma/schema.prisma && npm run build
    preDeployCommand: cd apps/api && npx prisma db push --schema ../../packages/db/prisma/schema.prisma
    startCommand: cd apps/api && npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: case-platform-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: CRYPTO_WEBHOOK_SECRET
        generateValue: true

  - type: web
    runtime: node
    name: case-platform-web
    region: frankfurt
    plan: starter
    buildCommand: cd apps/web && npm install --include=dev && npm run build
    startCommand: cd apps/web && npm run start -- -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: case-platform-db
    region: frankfurt
    plan: basic-256mb
    databaseName: case_platform
    user: case_platform
