services:
  - type: web
    runtime: node
    name: case-platform-api
    region: frankfurt
    plan: starter
    buildCommand: npm install && npm run db:generate && npm run build -w apps/api
    preDeployCommand: npm run db:deploy
    startCommand: npm run start -w apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: case-platform-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: CRYPTO_WEBHOOK_SECRET
        generateValue: true

  - type: web
    runtime: node
    name: case-platform-web
    region: frankfurt
    plan: starter
    buildCommand: npm install && npm run build -w apps/web
    startCommand: npm --workspace apps/web exec next start -- -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: case-platform-db
    region: frankfurt
    plan: basic-256mb
    databaseName: case_platform
    user: case_platform
